name: Bug report
description: File a bug report
title: "[BUG] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        **Before submitting:**
        - Check existing issues
        - Use the latest version
        - Write in English

  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: Using latest version
          required: true
        - label: Read the README
          required: true
        - label: Checked for duplicates
          required: true

  - type: dropdown
    attributes:
      label: Operating System
      multiple: true
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true

  - type: input
    attributes:
      label: Python Version
      placeholder: "3.11"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Bug Description
      placeholder: Describe what went wrong and what you expected
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run command...
        2. See error...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Error Log
      placeholder: |
        ```
        Paste error here
        ```
    validations:
      required: false
