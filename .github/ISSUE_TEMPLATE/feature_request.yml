name: Feature request
description: Suggest an idea
title: "[FEATURE] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        **Before submitting:**
        - Check existing issues
        - Write in English

  - type: textarea
    attributes:
      label: Feature Description
      placeholder: Describe the feature you'd like
    validations:
      required: true

  - type: textarea
    attributes:
      label: Problem (optional)
      placeholder: What problem does this solve?
    validations:
      required: false

  - type: textarea
    attributes:
      label: Alternatives (optional)
      placeholder: Any alternatives you've considered?
    validations:
      required: false
